<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hotseat — Coming Soon</title>
<meta name="description" content="Hotseat is coming. Take a seat." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #0d0d0f;
    color: #f5f2ee;
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
  }
  .glow {
    position: fixed; inset: auto;
    bottom: -40vh; left: 50%; transform: translateX(-50%);
    width: 120vw; height: 80vh;
    background: radial-gradient(ellipse at center, rgba(255,90,20,.28), rgba(255,45,10,.12) 45%, transparent 70%);
    pointer-events: none;
  }
  main { text-align: center; padding: 32px; position: relative; }
  .seat { font-size: 3rem; margin-bottom: 8px; }
  h1 {
    font-family: 'Archivo Black', system-ui, sans-serif;
    font-size: clamp(3.2rem, 14vw, 9rem);
    line-height: .95;
    letter-spacing: -.02em;
    text-transform: uppercase;
    background: linear-gradient(180deg, #fff 30%, #ff7a3c 75%, #ff3d14);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  p.tag { margin-top: 18px; font-size: 1.15rem; color: #b9b2ab; }
  .soon {
    display: inline-block; margin-top: 34px;
    border: 1px solid rgba(255,122,60,.5); color: #ff7a3c;
    padding: 10px 26px; border-radius: 999px;
    font-size: .85rem; font-weight: 500; letter-spacing: .22em; text-transform: uppercase;
  }
  footer {
    position: fixed; bottom: 22px; left: 0; right: 0;
    text-align: center; font-size: .8rem; color: #6e675f;
  }
  footer a { color: #b9b2ab; text-decoration: none; }
  footer a:hover { color: #ff7a3c; }
</style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>
  <main>
    <div class="seat" aria-hidden="true">🔥</div>
    <h1>Hotseat</h1>
    <p class="tag">Something's heating up. Take a seat — we'll be ready soon.</p>
    <span class="soon">Coming Soon</span>
  </main>
  <footer>
    © 2026 Hotseat · <a href="mailto:email@leverageassessments.com">Get in touch</a>
  </footer>
</body>
</html>
